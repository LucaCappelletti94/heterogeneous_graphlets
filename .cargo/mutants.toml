# cargo-mutants configuration.

# Exclude the differential-testing infrastructure: the brute-force reference
# counter and its harness (compiled only under cfg(test) or the `oracle`
# feature) are test code, not the published library, so mutating them does not
# validate production behaviour. The references are instead cross-checked against
# each other and against the crate by the differential proptests.
exclude_globs = ["src/oracle.rs"]

# Functions and mutants that no test can distinguish (equivalent mutants). Each
# is its own small function so the exclusion is precise and does not hide the
# real, tested mutants in the surrounding code.
exclude_re = [
  # `with_number_of_elements` returns an empty `HashMap`, and `HashMap::new()`
  # is behaviorally identical to `Default::default()`.
  "with_number_of_elements -> Self with Default::default",
  # `maximal_possible_hash` is a deliberately conservative upper bound on the
  # encoded hash: it exceeds the true maximum by about a whole `base^4` term,
  # so perturbations of its low-order terms stay within that slack and never
  # change whether the encodability assert fires. The encodability boundary is
  # pinned instead by dedicated tests (hash_capacity_* and the u8 label tests).
  "maximal_possible_hash",
  # `counted_at_canonical_root` counts each triangle/clique orbit once at a
  # canonical representative; flipping its comparison counts the complementary
  # representative of the same unordered pair, giving identical totals.
  "counted_at_canonical_root",
  # `graphlet_key_too_small` compares the largest possible hash against the key
  # type's maximum. The two are never exactly equal for any key type and label
  # count, so flipping `>` to `>=` is indistinguishable. The encodability
  # boundary is pinned instead by the hash_capacity_* and u8 label tests.
  "graphlet_key_too_small",
  # `decode_edge_typed` is on the deduplication path (and the oracle). Its initial
  # `key % edge_base^6` only feeds a six-digit extraction loop that reads positions
  # below `edge_base^6`, so replacing `%` with `+` adds a multiple of `edge_base^6`
  # that those digits never see: an equivalent mutant. Only this one mutant is
  # excluded; the rest of the function is pinned by the encode/decode roundtrip
  # property and the whole-graph dedup-vs-brute-force exactness test.
  "replace % with \\+ in decode_edge_typed",
  # The `src < dst` guard in `get_edge_typed_graph_signature` only selects one of
  # the two orientations of each undirected edge. Per-edge counts are orientation
  # symmetric (the canonical key is invariant under swapping the focal endpoints,
  # property 6) and the graph has no self-loops, so any guard that picks exactly one
  # orientation per edge (`>`, or `<=` since `src == dst` never occurs) produces the
  # identical signature: both are equivalent mutants.
  "replace < with (>|<=) in EdgeTypedGraphlets::get_edge_typed_graph_signature",
]
