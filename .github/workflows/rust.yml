name: Rust

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Build
        run: cargo build --verbose
      - name: Run tests
        run: cargo test --verbose
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  msrv:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up MSRV toolchain
        uses: dtolnay/rust-toolchain@1.81.0
      - name: Set up a recent toolchain for resolution
        uses: dtolnay/rust-toolchain@stable
      - name: Resolve dependencies to MSRV-compatible versions
        run: cargo +stable generate-lockfile
        env:
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: fallback
      - name: Build the library on the MSRV
        # Only the library is checked against the MSRV. The test and benchmark
        # dependencies (criterion and its tree) require a much more recent
        # toolchain and are exercised by the `test` job on stable instead.
        run: cargo +1.81.0 build --lib --locked --verbose

  deny:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Resolve dependencies to MSRV-compatible versions
        run: cargo generate-lockfile
        env:
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: fallback
      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny
      - name: Check advisories, licenses, bans and sources
        run: cargo deny check

  mutants:
    # Mutation-test only the lines changed by the pull request, so new code must
    # be covered by tests without failing on pre-existing gaps in the rest of the
    # codebase.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Resolve dependencies to MSRV-compatible versions
        run: cargo generate-lockfile
        env:
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: fallback
      - name: Install cargo-mutants
        uses: taiki-e/install-action@cargo-mutants
      - name: Mutation-test the pull request diff
        run: |
          git diff "origin/${{ github.base_ref }}...HEAD" > pr.diff
          cargo mutants --no-shuffle -j 4 --in-diff pr.diff

  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
